workflows:
  ios-app-store:
    name: iOS App Store / TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: dk.bkicsaff.bkicapp

    scripts:
      - name: Flutter clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Set iOS version + build number
        script: |
          cd ios
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all $BUILD_NUMBER
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=$HOME/export_options.plist

          echo "=== IPA files ==="
          find build -name "*.ipa" -print

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false